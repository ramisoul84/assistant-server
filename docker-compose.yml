services:
  assistant-server:
    build: .
    container_name: assistant-server
    restart: always
    env_file: .env.prod
    environment:
      APP_ENV: production
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /var/log/assistant:/var/log/assistant
    networks:
      - infra_net

networks:
  infra_net:
    external: true